<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>

      <div class="content-box">
        <!-- Add your devotional content here -->
        <table class="greyGridTable">
          <tr>
            <th>Speaker</th>
            <th>Title</th>
            <th>Location</th>
            <th>Year</th>
          </tr>
          <tr>
            <td>President Dallin H. Oak</td>
            <td>"Coming Closer to Jesus Christ"</td>
            <td>Marriot Center</td>
            <td>2025</td>
          </tr>
          <tr>
            <td>Jennie Pardoe</td>
            <td>"Righteous Failures"</td>
            <td>BYU-I: I-Center</td>
            <td>2024</td>
          </tr>
          <tr>
            <td>Brian Christensen</td>
            <td>"Remember and Perish Not"</td>
            <td>BYU-I: I-Center</td>
            <td>2025</td>
          </tr>
        </table>

        <form>
          <!-- Collecting: speaker, title, location, year -->
          <br>
          <p>What are your favourite BYUI devotionals?</p>
          <label for="speaker">Speaker:</label>
          <input type="text" id="speaker" name="speaker"> <br>
          <label for="title">Title:</label>
          <input type="text" id="title" name="title"> <br>
          <label for="location">Location:</label>
          <input type="text" id="location" name="location"> <br>
          <label for="year">Year:</label>
          <input type="text" id="year" name="year"> <br>
          <br><input type="submit" value="Submit">
        </form>

      </div>
    </main>
  </div>
</body>
</html>
