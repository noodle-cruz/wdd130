<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body{color: #e8eced}
        .card {
            display: flex;
            background: url(images/christus.webp);
            text-align: center;
            border: 10px solid black;
            font-family: Arial;
            border-radius: 50px;
            align-items: center;
            flex-direction: column;
            max-width: 1000px;
            margin: auto;
            margin-top: 20px;
        }
        h1 {margin: 0;
            color: white;
        }
        h2 {margin: 20px 0 0 0;
            color: white;
        }
        img {
            border-radius: 50%;
            border: 7px solid white;
            margin: 10px;
        }
        .tfp {
            align-items: center;
        }
        .president {
            width: 150px;
            height: 150px;
        }
        .counsellor {
            width: 130px;
            height: 130px;
        }
        .qta {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            grid-template-rows: auto auto auto;
            width: 600px;
        }
        .qta img {
            width: 100px;
            height: 100px;
        }
    </style>
</head>
<body>
    <!-- Insert HTML elements here -->
    <div class="card">
        <h1>The First Presidency</h1>
            <div class="tfp">
            <img class="counsellor" src="images/eyring.webp">
            <img class="president" src="images/oaks.webp">
            <img class="counsellor" src="images/christofferson.webp">
            </div>
        <h2>Quorum of the Twelve Apostles</h2>
        <div class="qta">
            <img src="images/holland.webp">
            <img src="images/uchtdorf.webp">
            <img src="images/bednar.webp">
            <img src="images/cook.webp">
            <img src="images/anderson.webp">
            <img src="images/rasband.webp">
            <img src="images/kearon.webp">
            <img src="images/renlund.webp">
            <img src="images/gong.webp">
            <img src="images/soares.webp">
            <img src="images/kearon.webp">
            <img src="images/causse.webp">
        </div>
    </div>
</body>
</html>
