<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        /*general*/
        * {
            margin: 0;
        }
        body {
            background: rgb(120, 96, 64);
        }
        #formContainer {
            display: flex;
            border: 10px solid navy;
            border-radius: 6%;
            background: white;
            flex-direction: column;
            align-items: center;
            text-align: center;
            margin: auto;
            margin-top: 20px;
            margin-bottom: 20px;
            width: 400px;
            height: 600px;
            overflow: hidden;
        }


        /*top*/
        header {
            background: url(images/jesus_feeds_5000_small.png);
            width: 100%;
            height: 170px;
            color: white;
            display: flex;
            flex-direction: column;
            flex-flow: column-reverse;
        }
        #htext {
            padding-bottom: 30px;
            text-shadow: black 2px 2px 1px;
        }
        #closeBtn {
            position: absolute;
            left: 10px;
            top: -220px;
        }

        h3 {
            margin: 20px;
        }
        

        /*middle*/
        #myForm {
            height: 260px;
        }
        
        #userinfo {
            display: grid;
            grid-template-columns: 1fr 1fr;
            align-items: center;
            justify-items: left;
            margin: 0 10px 10px 10px;
        }
        #username, #password, #email, #divgender {
            margin: 10px;
        }
        #userinfo label {
            padding-left: 10px;
        }
        
        #checknsubmit {
            display: flex;
            flex-direction: column;
            padding: none;
            height: auto;
            margin-top: -10px;
        }
        #checknsubmit section {
            margin: 5px;
        }


        /*bottom*/
        footer {
            display: flex;
            flex-flow: column-reverse;
            height: 110px;
        }
        #fbooks {
            justify-content: space-between;
            margin: -5px;
        }
        .book {
            width: 76.7px;
        }
        #myForm {
            position: relative;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <header>
            <div id="htext">
                <h1>Daily Feed</h1>
                <h2>Scripture a Day</h2>
            </div>
        </header>
        <h3>Sign Up for Daily Scripture Feed</h3>
        <form id="myForm">
            <div id="userinfo">
                <button type="button" id="closeBtn">X</button>
                <label for="username">User Name:</label>
                <input type="text" id="username" name="username" required>
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label>Gender:</label>
                <div id="divgender">
                    <input type="radio" id="male" name="gender" value="male" required>
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female" required>
                    <label for="female">Female</label>
                </div>
            </div>

            <div id="checknsubmit">
                <section>
                    <input type="checkbox" id="newsletter" name="newsletter">
                    <label for="newsletter">Subscribe to newsletter</label>
                </section>
    
                <section>
                    <input type="checkbox" id="conditions" name="conditions" required>
                    <label for="conditions">I acknowledge the terms and conditions</label>
                </section>
    
                <section id="submit">
                    <button type="submit">Submit</button>
                </section>
            </div>
        </form>
        <footer>
            <div id="fbooks">
                <img class="book" src="images/old_testament.webp">
                <img class="book" src="images/new_testament.webp">
                <img class="book" src="images/book_of_mormon.webp">
                <img class="book" src="images/doctrine_and_covenants.webp">
                <img class="book" src="images/pearl_of_great_price.webp">
            </div>
        </footer>

    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>

</body>

</html>
